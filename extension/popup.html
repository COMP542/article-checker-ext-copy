<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="browser-polyfill.js"></script>
    <script src="popup.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 12px; width: 320px; }
      button { width: 100%; padding: 10px; font-size: 14px; }
      .meta { margin-top: 10px; font-size: 12px; opacity: 0.85; }
      .box { margin-top: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; max-height: 180px; overflow: auto; white-space: pre-wrap; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <button id="extractBtn">Capture article text</button>

    <div class="meta" id="status"></div>
    <div class="meta" id="info"></div>

    <div class="box" id="preview" style="display:none;"></div>
  </body>
</html>
