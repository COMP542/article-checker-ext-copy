<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        margin: 12px;
        width: 360px;
      }

      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
      }

      .meta {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.85;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .tab-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #f7f7f7;
        cursor: pointer;
      }

      .tab-btn.active {
        font-weight: 600;
        background: #eaeaea;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .box {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
      }

      .json-box {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <button id="extractBtn">Capture article text</button>

    <div class="meta" id="status"></div>
    <div class="meta" id="info"></div>

    <div class="tabs">
      <button id="tabArticle" class="tab-btn active" type="button">Captured article</button>
      <button id="tabAnalysis" class="tab-btn" type="button">Backend analysis</button>
    </div>

    <div id="panelArticle" class="panel active">
      <div class="box" id="previewArticle"></div>
    </div>

    <div id="panelAnalysis" class="panel">
      <div class="box json-box" id="previewAnalysis"></div>
    </div>

    <script src="browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
